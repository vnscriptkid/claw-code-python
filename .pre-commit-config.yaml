repos:
  # Ruff: fast Python linter + formatter (replaces flake8, isort, pyupgrade, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff              # lint + auto-fix safe rules
        args: [--fix]
      - id: ruff-format       # format (replaces black)

  # Standard hygiene hooks from pre-commit itself
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements   # catches leftover breakpoint() / pdb calls

  # Run tests on push (slower; only fires on git push, not git commit)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
